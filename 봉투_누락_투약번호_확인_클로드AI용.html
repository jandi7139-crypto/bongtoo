<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>봉투 확인</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; }
.wrap { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
.card { background: #fff; border-radius: 14px; border: 1px solid #eee; padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 14px; font-weight: 500; color: #555; margin-bottom: 10px; }
.upload-zone { border: 1.5px dashed #ccc; border-radius: 12px; padding: 2rem 1rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
.upload-zone:hover, .upload-zone.drag { border-color: #4A7CF7; background: #f0f4ff; }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-text { font-size: 15px; font-weight: 500; color: #333; margin-bottom: 4px; }
.upload-hint { font-size: 13px; color: #999; }
.preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
.preview-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #f0f0f0; }
.preview-item img { width: 100%; height: 100%; object-fit: cover; }
.preview-remove { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: rgba(0,0,0,0.5); border-radius: 50%; border: none; color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
.btn { display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: opacity 0.15s, background 0.15s; }
.btn:active { opacity: 0.75; }
.btn-primary { background: #4A7CF7; color: #fff; }
.btn-primary:disabled { background: #b0c4f9; cursor: not-allowed; }
.btn-secondary { background: #fff; color: #666; border: 1px solid #ddd; font-weight: 400; margin-top: 10px; }
.loading { text-align: center; padding: 2rem 0; }
.spinner { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #4A7CF7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #888; }
.result-ok { background: #E8F5E9; border: 1px solid #81C784; border-radius: 14px; padding: 1.25rem; margin-bottom: 12px; }
.result-err { background: #FFEBEE; border: 1px solid #EF9A9A; border-radius: 14px; padding: 1.25rem; margin-bottom: 12px; }
.result-warn { background: #FFF9C4; border: 1px solid #F9A825; border-radius: 14px; padding: 1.25rem; margin-bottom: 12px; }
.result-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
.result-ok .result-title { color: #2e7d32; }
.result-err .result-title { color: #c62828; }
.result-warn .result-title { color: #e65100; }
.tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.tag { padding: 6px 14px; border-radius: 8px; font-size: 15px; font-weight: 500; }
.tag-err { background: #FFCDD2; color: #b71c1c; }
.tag-warn { background: #FFE082; color: #e65100; }
.tag-ok { background: #C8E6C9; color: #1b5e20; }
.raw-text { font-size: 13px; color: #555; background: #f5f5f5; border-radius: 8px; padding: 10px 12px; margin-top: 10px; white-space: pre-wrap; word-break: break-all; }
.big-icon { font-size: 36px; text-align: center; margin-bottom: 8px; }
.sep { border: none; border-top: 1px solid #eee; margin: 1rem 0; }
.detail-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
.detail-label { color: #888; }
.error-box { background: #FFEBEE; border: 1px solid #EF9A9A; border-radius: 12px; padding: 1rem; font-size: 14px; color: #c62828; margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>봉투 확인</h1>
  <p class="subtitle">사진을 찍어 올리면 AI가 투약번호와 누락 봉투를 자동으로 확인합니다</p>

  <div id="uploadSection">
    <div class="card">
      <div class="card-title">봉투 사진 올리기 (여러 장 가능)</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" accept="image/*" multiple id="fileInput" onchange="handleFiles(this.files)" />
        <div class="upload-icon">📷</div>
        <div class="upload-text">사진 선택 또는 촬영</div>
        <div class="upload-hint">봉투 라벨이 잘 보이게 찍어주세요</div>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>

    <div id="errorBox" class="error-box" style="display:none;"></div>

    <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()" disabled>AI 분석 시작</button>
    <button class="btn btn-secondary" onclick="resetAll()">초기화</button>
  </div>

  <div id="loadingSection" style="display:none;">
    <div class="card">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">사진 분석 중...</div>
      </div>
    </div>
  </div>

  <div id="resultSection" style="display:none;">
    <div id="resultContent"></div>
    <button class="btn btn-primary" onclick="resetAll()" style="margin-top:4px;">다시 확인</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `당신은 약국 봉투 라벨을 분석하는 전문가입니다.

봉투 라벨에는 다음 형식의 정보가 있습니다:
- 투약번호(4자리 숫자): 예) 1453
- 봉투번호/전체봉투수: 예) 3/12 (12개 중 3번째)

여러 장의 사진에서 보이는 모든 봉투 정보를 추출하여 반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트는 절대 포함하지 마세요.

{
  "bags": [
    {"rx": "1453", "seq": 3, "total": 12},
    {"rx": "1453", "seq": 5, "total": 12}
  ],
  "notes": "특이사항 (없으면 빈 문자열)"
}

- rx: 투약번호 (문자열, 없으면 null)
- seq: 봉투 순번 (숫자)
- total: 전체 봉투 수 (숫자)
- notes: 읽기 어렵거나 특이한 점`;

let imageFiles = [];
let imageDataUrls = [];

function handleFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    const reader = new FileReader();
    reader.onload = (e) => {
      imageDataUrls.push(e.target.result);
      imageFiles.push(f);
      renderPreviews();
      document.getElementById('analyzeBtn').disabled = imageDataUrls.length === 0;
    };
    reader.readAsDataURL(f);
  }
}

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';
  imageDataUrls.forEach((url, i) => {
    const div = document.createElement('div');
    div.className = 'preview-item';
    div.innerHTML = `<img src="${url}" alt="봉투 사진 ${i+1}">
      <button class="preview-remove" onclick="removeImage(${i})" aria-label="사진 제거">×</button>`;
    grid.appendChild(div);
  });
}

function removeImage(idx) {
  imageDataUrls.splice(idx, 1);
  imageFiles.splice(idx, 1);
  renderPreviews();
  document.getElementById('analyzeBtn').disabled = imageDataUrls.length === 0;
}

async function analyze() {
  if (imageDataUrls.length === 0) return;
  document.getElementById('uploadSection').style.display = 'none';
  document.getElementById('loadingSection').style.display = 'block';
  document.getElementById('errorBox').style.display = 'none';

  const loadingMsgs = ['사진 분석 중...', 'AI가 라벨을 읽고 있어요...', '투약번호 확인 중...'];
  let msgIdx = 0;
  const msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMsgs.length;
    document.getElementById('loadingText').textContent = loadingMsgs[msgIdx];
  }, 1800);

  try {
    const content = [];
    for (let i = 0; i < imageDataUrls.length; i++) {
      const url = imageDataUrls[i];
      const mediaType = url.split(';')[0].split(':')[1];
      const base64 = url.split(',')[1];
      content.push({ type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } });
      content.push({ type: 'text', text: `위 사진(${i+1}번째)에서 보이는 봉투 라벨 정보를 추출해주세요.` });
    }
    content.push({ type: 'text', text: '모든 사진의 봉투 정보를 종합하여 JSON으로 응답해주세요.' });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content }]
      })
    });

    clearInterval(msgInterval);

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || '분석 실패');
    }

    const data = await response.json();
    const text = data.content.map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    showResult(parsed);
  } catch (e) {
    clearInterval(msgInterval);
    document.getElementById('loadingSection').style.display = 'none';
    document.getElementById('uploadSection').style.display = 'block';
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorBox').textContent = '오류: ' + e.message;
  }
}

function showResult(data) {
  document.getElementById('loadingSection').style.display = 'none';
  document.getElementById('resultSection').style.display = 'block';

  const bags = data.bags || [];
  if (bags.length === 0) {
    document.getElementById('resultContent').innerHTML = `
      <div class="result-warn">
        <div class="result-title">⚠ 봉투 정보를 읽지 못했습니다</div>
        <p style="font-size:14px;color:#e65100;">봉투 라벨이 잘 보이도록 다시 촬영해보세요.</p>
        ${data.notes ? `<p style="font-size:13px;margin-top:8px;color:#666;">${data.notes}</p>` : ''}
      </div>`;
    return;
  }

  const total = bags[0].total;
  const scannedSeqs = new Set(bags.map(b => b.seq));
  const rxNums = [...new Set(bags.filter(b => b.rx).map(b => b.rx))];
  const rxBase = rxNums[0] || null;
  const rxMismatch = rxBase ? bags.filter(b => b.rx && b.rx !== rxBase) : [];
  const missing = [];
  for (let i = 1; i <= total; i++) { if (!scannedSeqs.has(i)) missing.push(i); }

  let html = '';

  html += `<div class="card">
    <div class="card-title">분석 결과</div>
    <div class="detail-row"><span class="detail-label">전체 봉투 수</span><span>${total}개</span></div>
    <div class="detail-row"><span class="detail-label">인식된 봉투</span><span>${bags.length}개</span></div>
    ${rxBase ? `<div class="detail-row"><span class="detail-label">기준 투약번호</span><span style="font-weight:500;">${rxBase}</span></div>` : ''}
    ${data.notes ? `<hr class="sep"><p style="font-size:13px;color:#888;">${data.notes}</p>` : ''}
  </div>`;

  if (rxMismatch.length > 0) {
    html += `<div class="result-err">
      <div class="result-title">⚠ 투약번호 불일치 ${rxMismatch.length}건</div>
      <p style="font-size:13px;color:#c62828;margin-bottom:8px;">기준: <strong>${rxBase}</strong></p>
      <div class="tags">${rxMismatch.map(b => `<span class="tag tag-warn">${b.seq}번 → ${b.rx}</span>`).join('')}</div>
    </div>`;
  }

  if (missing.length === 0) {
    html += `<div class="result-ok">
      <div class="big-icon">✓</div>
      <div class="result-title" style="text-align:center;">모든 봉투 확인 완료</div>
      <p style="font-size:14px;color:#2e7d32;text-align:center;">${total}개 모두 확인되었습니다</p>
    </div>`;
  } else {
    html += `<div class="result-err">
      <div class="result-title">⚠ 누락된 봉투 ${missing.length}개</div>
      <div class="tags">${missing.map(n => `<span class="tag tag-err">${n}번</span>`).join('')}</div>
      <p style="font-size:13px;color:#c62828;margin-top:10px;">${bags.length}/${total}개 인식됨</p>
    </div>`;
  }

  if (rxMismatch.length === 0 && missing.length === 0) {
  } else {
    html += `<div style="font-size:13px;color:#888;margin-top:4px;padding:0 4px;">인식된 봉투: `;
    html += bags.map(b => `<span style="background:#E8F5E9;color:#2e7d32;border-radius:6px;padding:2px 8px;margin:2px;display:inline-block;font-size:13px;">${b.seq}번${b.rx ? ' ('+b.rx+')' : ''}</span>`).join('');
    html += `</div>`;
  }

  document.getElementById('resultContent').innerHTML = html;
}

function resetAll() {
  imageFiles = [];
  imageDataUrls = [];
  document.getElementById('previewGrid').innerHTML = '';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('fileInput').value = '';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('uploadSection').style.display = 'block';
  document.getElementById('loadingSection').style.display = 'none';
  document.getElementById('resultSection').style.display = 'none';
}
</script>
</body>
</html>
